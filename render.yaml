# Render Blueprint — deploy backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sysbound-cx-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sysbound-cx-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://mchavez31.github.io
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: sysbound-cx-db
    plan: free
    databaseName: sysbound_cx
    user: sysbound_cx
