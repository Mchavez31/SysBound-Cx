# Render Blueprint — FREE tier (no credit card required)
# Docs: https://render.com/docs/free
services:
  - type: web
    name: sysbound-cx-api
    runtime: python
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sysbound-cx-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://mchavez31.github.io/SysBound-Cx
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: sysbound-cx-db
    plan: free
    databaseName: sysbound_cx
    user: sysbound_cx
