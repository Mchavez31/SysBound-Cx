# Build the Vite app and deploy frontend/dist to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions (not "Deploy from branch").
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Set in repo Settings → Secrets and variables → Actions → Variables: VITE_API_URL
          # Example: https://sysbound-cx-api.onrender.com/api
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
      - name: SPA fallback for GitHub Pages routes
        run: cp dist/index.html dist/404.html
        working-directory: frontend
      # Required so Pages accepts the artifact (see GitHub Pages + Actions docs)
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
